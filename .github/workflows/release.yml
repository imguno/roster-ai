name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: roster/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Dashboard
        working-directory: roster/internal/web/dashboard
        run: npm ci && npm run build

      - name: Build
        working-directory: roster
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -o ../roster-${GOOS}-${GOARCH}${ext} ./cmd/roster

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: roster-*
