kind: organization
name: MegaCorp

groups:
  # Product Division
  - product-strategy
  - design-team
  # Engineering Division
  - frontend-team
  - backend-team
  - infra-team
  - qa-team
  # Data Division
  - analytics-team
  - ml-team
  # Operations Division
  - devops-team
  - security-team
  # Business Division
  - marketing-team
  - support-team

resources:
  - github
  - jira
  - datadog
  - database
  - notion
  - slack

routing:
  # Product → Engineering flow
  - on: feature.requested
    to: product-strategy
  - on: spec.approved
    to: design-team
  - on: design.completed
    to: frontend-team
  - on: design.completed
    to: backend-team

  # Engineering internal flow
  - on: api.ready
    to: frontend-team
  - on: frontend.ready
    to: qa-team
  - on: backend.ready
    to: qa-team
  - on: qa.passed
    to: devops-team
  - on: qa.failed
    to: backend-team
  - on: qa.failed
    to: frontend-team

  # Deploy flow
  - on: deploy.ready
    to: infra-team
  - on: deploy.completed
    to: analytics-team
  - on: deploy.completed
    to: security-team

  # Data flow
  - on: data.insight
    to: product-strategy
  - on: data.insight
    to: marketing-team
  - on: ml.model.ready
    to: backend-team

  # Business flow
  - on: release.published
    to: marketing-team
  - on: release.published
    to: support-team
  - on: incident.detected
    to: devops-team
  - on: incident.detected
    to: support-team
  - on: customer.feedback
    to: product-strategy
  - on: customer.feedback
    to: analytics-team
